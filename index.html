<!DOCTYPE html>
<html>
<head>
    <title>The Legendary STAB CLAN Website</title>

    <!-- Responsive scaling -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Knife-style clean aggressive font -->
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Bebas Neue', Arial, sans-serif; 
            background-color: #000000; /* black background */
            color: #ffffff;
            margin: 0;
        }

        /* Navigation styling */
        .nav {
            display: flex;
            align-items: center;
            background-color: #000000;
            padding: 20px 30px;
            border-bottom: 3px solid #d4af37; /* gold underline */
        }

        .nav img {
            height: 110px; /* bigger logo */
            margin-right: 35px;

            /* GOLD GLOW */
            filter: drop-shadow(0 0 8px #d4af37) drop-shadow(0 0 14px #d4af37);
        }

        .nav a {
            margin-right: 30px;
            color: #d4af37;
            font-size: 28px;
            letter-spacing: 1px;
            text-decoration: none;
        }

        .nav a:hover {
            color: #cc0000;
        }

        /* Page content */
        .content {
            padding: 80px;
            text-align: center;
        }

        h1 {
            color: #cc0000;
            font-size: 72px;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        p {
            font-size: 32px;
            color: #d4af37;
            letter-spacing: 1px;
        }

        /* ----------------------------- */
        /* RESPONSIVE DESIGN BREAKPOINTS */
        /* ----------------------------- */

        /* Phones */
        @media (max-width: 600px) {
            .nav img {
                height: 70px;
            }

            .nav a {
                font-size: 20px;
                margin-right: 15px;
            }

            h1 {
                font-size: 48px;
            }

            p {
                font-size: 22px;
            }

            .content {
                padding: 40px 20px;
            }
        }

        /* Tablets */
        @media (min-width: 601px) and (max-width: 1024px) {
            .nav img {
                height: 90px;
            }

            .nav a {
                font-size: 24px;
                margin-right: 20px;
            }

            h1 {
                font-size: 60px;
            }

            p {
                font-size: 26px;
            }

            .content {
                padding: 60px 40px;
            }
        }

        /* Large desktops */
        @media (min-width: 1400px) {
            .content {
                padding: 100px 200px;
            }

            h1 {
                font-size: 80px;
            }

            p {
                font-size: 36px;
            }
        }
    </style>
</head>
<body>

    <!-- Navigation -->
    <div class="nav">
        <img src="stabclanlogo.png" alt="STAB Clan Logo">
        <a href="index.html">Home</a>
        <a href="members.html">Members</a>
        <a href="history.html">History</a>
        <a href="legacy.html">Legacy Hall</a>
        <a href="awards.html">Awards</a>
        <a href="media.html">Media</a>
    </div>

    <!-- Page Content -->
    <div class="content">
        <h1>The Legendary STAB CLAN Website</h1>
        <p>Precision. Skill. Dominance. Competitive knifing since 2009.</p>
    </div>

</body>
</html>
