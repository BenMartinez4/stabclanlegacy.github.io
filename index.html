<!DOCTYPE html>
<html>
<head>
    <title>STAB Clan Legacy</title>
    <style>
        body { 
            font-family: Arial; 
            background-color: #ffffff;
            color: #000000;
            margin: 0;

            /* Responsive background image */
            background-image: url('stabbackground.png');
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            background-attachment: fixed;
        }

        /* Dark overlay */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.45); /* dark transparent layer */
            z-index: -1; /* behind content */
        }

        /* Navigation styling */
        .nav {
            display: flex;
            align-items: center;
            background-color: rgba(0, 0, 0, 0.85);
            padding: 10px 20px;
            border-bottom: 3px solid #d4af37; /* gold underline */
        }

        .nav img {
            height: 50px;
            margin-right: 25px;

            /* GOLD GLOW */
            filter: drop-shadow(0 0 6px #d4af37) drop-shadow(0 0 12px #d4af37);
        }

        .nav a {
            margin-right: 20px;
            color: #d4af37; /* gold */
            font-weight: bold;
            text-decoration: none;
        }

        .nav a:hover {
            color: #cc0000; /* red hover */
        }

        /* Page content */
        .content {
            padding: 40px;
            background-color: rgba(255, 255, 255, 0.85); /* white panel */
            border-radius: 10px;
            margin: 40px;
        }

        h1 {
            color: #cc0000; /* deep red */
        }

        /* Mobile optimization */
        @media (max-width: 768px) {
            body {
                background-attachment: scroll;
                background-size: contain;
                background-position: top center;
            }

            .content {
                margin: 20px;
                padding: 25px;
            }

            .nav img {
                height: 40px;
            }
        }
    </style>
</head>

    </div>
