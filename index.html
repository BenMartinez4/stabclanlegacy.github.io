<!DOCTYPE html>
<html>
<head>
    <title>The Legendary STAB CLAN Website</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Bebas Neue', Arial, sans-serif; 
            background-color: #000000;
            color: #ffffff;
            margin: 0;
        }

        /* DESKTOP NAV BAR */
        .nav {
            display: flex;
            align-items: center;
            background-color: #000000;
            padding: 20px 30px;
            border-bottom: 3px solid #d4af37;
        }

        .nav img {
            height: 110px;
            margin-right: 35px;
            filter: drop-shadow(0 0 8px #d4af37) drop-shadow(0 0 14px #d4af37);
        }

        .nav-links {
            display: flex;
        }

        .nav a {
            margin-right: 30px;
            color: #d4af37;
            font-size: 28px;
            letter-spacing: 1px;
            text-decoration: none;
        }

        .nav a:hover {
            color: #cc0000;
        }

        /* CONTENT */
        .content {
            padding: 60px;
            text-align: center;
        }

        h1 {
            color: #cc0000;
            font-size: 72px;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        p {
            font-size: 32px;
            color: #d4af37;
            letter-spacing: 1px;
        }

        /* ----------------------------- */
        /* MOBILE LAYOUT REWORK          */
        /* ----------------------------- */

        @media (max-width: 700px) {

            /* Hide desktop nav links */
            .nav-links {
                display: none;
            }

            /* Center logo on mobile */
            .nav {
                justify-content: center;
                padding: 10px;
            }

            .nav img {
                height: 80px;
                margin: 0;
            }

            /* Title stays big */
            h1 {
                font-size: 48px;
                margin-top: 20px;
            }

            /* Hamburger button BELOW title */
            .hamburger {
                display: block;
                font-size: 55px;
                color: #d4af37;
                margin: 20px auto 10px auto;
                cursor: pointer;
            }

            /* Dropdown menu appears BELOW the hamburger */
            .dropdown {
                display: none;
                flex-direction: column;
                width: 100%;
                background-color: #000000;
                border-top: 3px solid #d4af37;
                padding: 20px 0;
            }

            .dropdown a {
                font-size: 30px;
                padding: 18px 0;
                text-align: center;
                color: #d4af37;
                width: 100%;
            }

            .dropdown a:hover {
                background-color: #111;
                color: #cc0000;
            }

            /* Highlight the HOME/BACK button */
            .dropdown a:first-child {
                background-color: #111;
                border-bottom: 2px solid #d4af37;
                font-size: 34px;
            }

            /* Content spacing */
            .content {
                padding: 40px 20px;
            }
        }

        /* Hide hamburger on desktop */
        .hamburger {
            display: none;
        }
    </style>

    <script>
        function toggleMenu() {
            const menu = document.getElementById("dropdownMenu");
            menu.style.display = menu.style.display === "flex" ? "none" : "flex";
        }
    </script>

</head>
<body>

    <!-- DESKTOP NAVIGATION -->
    <div class="nav">
        <img src="stabclanlogo.png" alt="STAB Clan Logo">

        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="members.html">Members</a>
            <a href="history.html">History</a>
            <a href="legacy.html">Legacy Hall</a>
            <a href="awards.html">Awards</a>
            <a href="media.html">Media</a>
        </div>
    </div>

    <!-- PAGE TITLE -->
    <div class="content" style="padding-top:20px;">
        <h1>The Legendary STAB CLAN Website</h1>

        <!-- MOBILE HAMBURGER BUTTON -->
        <div class="hamburger" onclick="toggleMenu()">☰</div>

        <!-- MOBILE DROPDOWN MENU -->
        <div id="dropdownMenu" class="dropdown">
            <a href="index.html">⬅ Home</a>
            <a href="members.html">Members</a>
            <a href="history.html">History</a>
            <a href="legacy.html">Legacy Hall</a>
            <a href="awards.html">Awards</a>
            <a href="media.html">Media</a>
        </div>

        <p>Precision. Skill. Dominance. Competitive knifing since 2009.</p>
    </div>

</body>
</html>
