<!DOCTYPE html>
<html>
<head>
    <title>The Legendary STAB CLAN Website</title>

    <!-- Responsive scaling -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Knife-style clean aggressive font -->
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Bebas Neue', Arial, sans-serif; 
            background-color: #000000;
            color: #ffffff;
            margin: 0;
        }

        /* FIXED NAV BAR */
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            align-items: center;
            background-color: #000000;
            padding: 20px 30px;
            border-bottom: 3px solid #d4af37;
            z-index: 1000;
        }

        .nav img {
            height: 110px;
            margin-right: 35px;
            filter: drop-shadow(0 0 8px #d4af37) drop-shadow(0 0 14px #d4af37);
        }

        .nav-links {
            display: flex;
        }

        .nav a {
            margin-right: 30px;
            color: #d4af37;
            font-size: 28px;
            letter-spacing: 1px;
            text-decoration: none;
        }

        .nav a:hover {
            color: #cc0000;
        }

        /* HAMBURGER MENU (hidden on desktop) */
        .hamburger {
            display: none;
            font-size: 40px;
            color: #d4af37;
            cursor: pointer;
            margin-left: auto;
        }

        /* DROPDOWN MENU (mobile only) */
        .dropdown {
            display: none;
            flex-direction: column;
            background-color: #000000;
            border-top: 2px solid #d4af37;
            padding: 10px 20px;
        }

        .dropdown a {
            margin: 10px 0;
            font-size: 26px;
        }

        /* Page content */
        .content {
            padding: 160px 40px 80px; /* extra top padding because nav is fixed */
            text-align: center;
        }

        h1 {
            color: #cc0000;
            font-size: 72px;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        p {
            font-size: 32px;
            color: #d4af37;
            letter-spacing: 1px;
        }

        /* ----------------------------- */
        /* RESPONSIVE DESIGN BREAKPOINTS */
        /* ----------------------------- */

        /* Phones */
        @media (max-width: 700px) {

            .nav img {
                height: 80px;
            }

            .nav-links {
                display: none; /* hide normal nav */
            }

            .hamburger {
                display: block; /* show hamburger */
            }

            .dropdown {
                display: none; /* stays hidden until clicked */
            }

            h1 {
                font-size: 48px;
            }

            p {
                font-size: 22px;
            }

            .content {
                padding: 140px 20px;
            }
        }
    </style>

    <script>
        function toggleMenu() {
            const menu = document.getElementById("dropdownMenu");
            menu.style.display = menu.style.display === "flex" ? "none" : "flex";
        }
    </script>

</head>
<body>

    <!-- Navigation -->
    <div class="nav">
        <img src="stabclanlogo.png" alt="STAB Clan Logo">

        <!-- Desktop Links -->
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="members.html">Members</a>
            <a href="history.html">History</a>
            <a href="legacy.html">Legacy Hall</a>
            <a href="awards.html">Awards</a>
            <a href="media.html">Media</a>
        </div>

        <!-- Hamburger Icon -->
        <div class="hamburger" onclick="toggleMenu()">☰</div>
    </div>

    <!-- Mobile Dropdown Menu -->
    <div id="dropdownMenu" class="dropdown">
        <a href="index.html">Home</a>
        <a href="members.html">Members</a>
        <a href="history.html">History</a>
        <a href="legacy.html">Legacy Hall</a>
        <a href="awards.html">Awards</a>
        <a href="media.html">Media</a>
    </div>

    <!-- Page Content -->
    <div class="content">
        <h1>The Legendary STAB CLAN Website</h1>
        <p>Precision. Skill. Dominance. Competitive knifing since 2009.</p>
    </div>

</body>
</html>
