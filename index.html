    <style>

            background-repeat: no-repeat;

        .nav img {
            height: 50px;
            margin-right: 25px;

            /* GOLD GLOW */
            filter: drop-shadow(0 0 6px #d4af37) drop-shadow(0 0 12px #d4af37);
        }

        .nav a {
            margin-right: 20px;
            color: #d4af37; /* gold */
            font-weight: bold;
            text-decoration: none;
        }

        .nav a:hover {
            color: #cc0000; /* red hover */
        }

        /* Page content spacing */
        .content {
            padding: 40px;
            background-color: rgba(255, 255, 255, 0.85); /* white panel with transparency */

    <!-- Navigation -->
