<!DOCTYPE html>
<html>
<head>
    <title>The Legendary STAB CLAN Website</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Bebas Neue', Arial, sans-serif; 
            background-color: #000000;
            color: #ffffff;
            margin: 0;
        }

        /* DESKTOP NAV BAR */
        .nav {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            background-color: #000000;
            padding: 20px 30px;
            border-bottom: 3px solid #d4af37;
        }

        .nav img {
            height: 110px;
            margin-right: 35px;
            filter: drop-shadow(0 0 8px #d4af37) drop-shadow(0 0 14px #d4af37);
        }

        .nav-links {
            display: flex;
        }

        .nav a {
            margin-right: 30px;
            color: #d4af37;
            font-size: 28px;
            letter-spacing: 1px;
            text-decoration: none;
        }

        .nav a:hover {
            color: #cc0000;
        }

        /* CONTENT */
        .content {
            padding: 60px;
            text-align: center;
        }

        h1 {
            color: #cc0000;
            font-size: 72px;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        p {
            font-size: 32px;
            color: #d4af37;
            letter-spacing: 1px;
            margin-bottom: 40px;
        }

        /* GRID OF LINKS UNDER PARAGRAPH */
        .link-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            max-width: 500px;
            margin: 0 auto;
        }

        .link-grid a {
            display: block;
            background-color: #111;
            color: #d4af37;
            text-decoration: none;
            font-size: 24px;
            padding: 20px;
            border: 2px solid #d4af37;
            border-radius: 10px;
            transition: all 0.2s ease-in-out;
        }

        .link-grid a:hover {
            background-color: #222;
            color: #cc0000;
            transform: scale(1.05);
        }

        /* MOBILE ADJUSTMENTS */
        @media (max-width: 700px) {
            h1 {
                font-size: 48px;
            }
            p {
                font-size: 24px;
            }
            .link-grid {
                grid-template-columns: 1fr 1fr; /* 2 columns on mobile */
                gap: 15px;
                max-width: 100%;
                padding: 0 10px;
            }
            .link-grid a {
                font-size: 20px;
                padding: 15px;
            }
        }

    </style>
</head>
<body>

    <!-- DESKTOP NAVIGATION -->
    <div class="nav">
        <img src="stabclanlogo.png" alt="STAB Clan Logo">
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="members.html">Members</a>
            <a href="history.html">History</a>
            <a href="legacy.html">Legacy Hall</a>
            <a href="awards.html">Awards</a>
            <a href="media.html">Media</a>
        </div>
    </div>

    <!-- PAGE CONTENT -->
    <div class="content">
        <h1>The Legendary STAB CLAN Website</h1>
        <p>Precision. Skill. Dominance. Competitive knifing since 2009.</p>

        <!-- GRID OF LINKS BELOW PARAGRAPH -->
        <div class="link-grid">
            <a href="index.html">Home</a>
            <a href="members.html">Members</a>
            <a href="history.html">History</a>
            <a href="legacy.html">Legacy Hall</a>
            <a href="awards.html">Awards</a>
            <a href="media.html">Media</a>
        </div>
    </div>

</body>
</html>
