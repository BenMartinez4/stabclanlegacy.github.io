<!DOCTYPE html>
<html>
<head>
    <title>The Legendary STAB CLAN Website</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Bebas Neue', Arial, sans-serif; 
            background-color: #000000;
            color: #ffffff;
            margin: 0;
        }

        /* ---------------------- */
        /* NAVIGATION BAR          */
        /* ---------------------- */
        .nav {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            background-color: #000000;
            padding: 20px 30px;
            border-bottom: 3px solid #d4af37;
        }

        /* Desktop logo */
        .nav img {
            height: 110px;
            margin-right: 35px;
            filter: drop-shadow(0 0 8px #d4af37) drop-shadow(0 0 14px #d4af37);
        }

        .nav-links {
            display: flex;
        }

        .nav a {
            margin-right: 30px;
            color: #d4af37;
            font-size: 28px;
            letter-spacing: 1px;
            text-decoration: none;
        }

        .nav a:hover {
            color: #cc0000;
        }

        /* ---------------------- */
        /* PAGE CONTENT            */
        /* ---------------------- */
        .content {
            padding: 60px;
            text-align: center;
        }

        h1 {
            color: #cc0000;
            font-size: 72px;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        p {
            font-size: 32px;
            color: #d4af37;
            letter-spacing: 1px;
            margin-bottom: 40px;
        }

        /* ---------------------- */
        /* MOBILE GRID OF LINKS   */
        /* ---------------------- */
        .link-grid {
            display: none; /* hide on desktop */
        }

        /* ---------------------- */
        /* MOBILE STYLES           */
        /* ---------------------- */
        @media (max-width: 700px) {

            /* Hide nav links but keep logo */
            .nav-links {
                display: none;
            }

            /* Make logo stretch full width like banner */
            .nav img {
                width: 100%;
                height: auto;
                margin: 0;
                display: block;
                object-fit: contain;
                filter: drop-shadow(0 0 8px #d4af37) drop-shadow(0 0 14px #d4af37);
            }

            h1 {
                font-size: 48px;
            }

            p {
                font-size: 24px;
            }

            /* Show mobile-only grid */
            .link-grid {
                display: grid;
                grid-template-columns: 1fr 1fr; /* 2 columns */
                gap: 15px;
                max-width: 100%;
                margin: 0 auto;
                padding: 0 10px;
            }

            .link-grid a {
                display: block;
                background-color: #111;
                color: #d4af37;
                text-decoration: none;
                font-size: 20px;
                padding: 15px;
                border: 2px solid #d4af37;
                border-radius: 10px;
                transition: all 0.2s ease-in-out;
                text-align: center;
            }

            .link-grid a:hover {
                background-color: #222;
                color: #cc0000;
                transform: scale(1.05);
            }
        }

    </style>
</head>
<body>

    <!-- NAVIGATION BAR (logo + links) -->
    <div class="nav">
        <img src="stabclanlogo.png" alt="STAB Clan Logo">
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="roster.html">Roster</a>
            <a href="history.html">History</a>
            <a href="legacy.html">Legacy Hall</a>
            <a href="awards.html">Awards</a>
            <a href="media.html">Media</a>
        </div>
    </div>

    <!-- PAGE CONTENT -->
    <div class="content">
        <h1>The Legendary STAB CLAN</h1>
        <p>Precision. Skill. Dominance. Competitive knifing since 2009.</p>

        <!-- MOBILE ONLY GRID OF LINKS -->
        <div class="link-grid">
            <a href="index.html">Home</a>
            <a href="roster.html">Roster</a>
            <a href="history.html">History</a>
            <a href="legacy.html">Legacy Hall</a>
            <a href="awards.html">Awards</a>
            <a href="media.html">Media</a>
        </div>
    </div>

</body>
</html>
