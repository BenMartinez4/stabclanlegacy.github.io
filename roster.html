<!DOCTYPE html>
<html>
<head>
    <title>STAB Roster</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', Arial, sans-serif;
            background-color: #000;
            color: #d4af37;
            margin: 0;
            padding: 30px;
            text-align: center;
        }

        .nav { margin-bottom: 25px; }
        .nav a {
            margin-right: 18px;
            color: #d4af37;
            font-size: 20px;
            text-decoration: none;
            font-weight: 400;
        }
        .nav a:hover { color: #cc0000; }

        h1 {
            color: #cc0000;
            font-size: 40px;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .category-title {
            color: #cc0000;
            font-size: 26px;
            margin-top: 35px;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .member-name {
            font-size: 18px;
            color: #d4af37;
            margin: 2px 0;
            font-weight: 300;
        }

        @media (max-width: 700px) {
            h1 { font-size: 32px; }
            .category-title { font-size: 22px; }
            .member-name { font-size: 16px; }
        }
    </style>
</head>
<body>

    <div class="nav">
        <a href="index.html">Home</a>
        <a href="roster.html">Roster</a>
        <a href="history.html">History</a>
        <a href="legacy.html">Legacy Hall</a>
        <a href="awards.html">Awards</a>
        <a href="media.html">Media</a>
    </div>

    <h1>STAB Roster</h1>

    <div id="roster"></div>

    <script>
        const FIXED_ORDER = ["Leader", "Council Members", "BATS Captain"];

        async function loadRoster() {
            const response = await fetch("members.json");
            const data = await response.json();

            const container = document.getElementById("roster");
            container.innerHTML = "";

            // Render fixed categories in exact order
            FIXED_ORDER.forEach(category => {
                renderCategory(container, category, data[category]);
            });

            // Render remaining categories alphabetically
            Object.keys(data)
                .filter(cat => !FIXED_ORDER.includes(cat))
                .sort()
                .forEach(category => {
                    const sortedMembers = [...data[category]].sort((a, b) => a.localeCompare(b));
                    renderCategory(container, category, sortedMembers);
                });
        }

        function renderCategory(container, title, members) {
            const h2 = document.createElement("h2");
            h2.className = "category-title";
            h2.textContent = title;
            container.appendChild(h2);

            members.forEach(name => {
                const p = document.createElement("p");
                p.className = "member-name";
                p.textContent = name;
                container.appendChild(p);
            });
        }

        // Console Commands
        window.addMember = function(category, name) {
            fetch("members.json")
                .then(r => r.json())
                .then(data => {
                    if (!data[category]) data[category] = [];
                    data[category].push(name);

                    saveJSON(data);
                });
        };

        window.removeMember = function(category, name) {
            fetch("members.json")
                .then(r => r.json())
                .then(data => {
                    if (!data[category]) return;

                    data[category] = data[category].filter(n => n !== name);

                    saveJSON(data);
                });
        };

        function saveJSON(data) {
            const blob = new Blob([JSON.stringify(data, null, 4)], { type: "application/json" });
            const url = URL.createObjectURL(blob);

            const a = document.createElement("a");
            a.href = url;
            a.download = "members.json";
            a.click();

            alert("Download updated members.json and upload it to GitHub.");
        }

        loadRoster();
    </script>

</body>
</html>
