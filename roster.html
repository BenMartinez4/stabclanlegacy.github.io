<!DOCTYPE html>
<html>
<head>
    <title>STAB Roster</title>

    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Bebas Neue', Arial, sans-serif;
            background-color: #000;
            color: #d4af37;
            margin: 0;
            padding: 40px;
            text-align: center;
        }

        /* Navigation */
        .nav {
            margin-bottom: 30px;
        }

        .nav a {
            margin-right: 20px;
            color: #d4af37;
            font-size: 28px;
            text-decoration: none;
            letter-spacing: 1px;
        }

        .nav a:hover {
            color: #cc0000;
        }

        /* Titles */
        h1 {
            color: #cc0000;
            font-size: 72px;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .category-title {
            color: #cc0000;
            font-size: 48px;
            margin-top: 50px;
            margin-bottom: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .member-name {
            font-size: 28px;
            color: #d4af37;
            margin: 4px 0;
            letter-spacing: 1px;
        }

        /* Mobile adjustments */
        @media (max-width: 700px) {
            h1 {
                font-size: 48px;
            }
            .category-title {
                font-size: 36px;
            }
            .member-name {
                font-size: 22px;
            }
        }
    </style>
</head>
