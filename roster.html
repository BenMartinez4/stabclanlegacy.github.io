<!DOCTYPE html>
<html>
<head>
    <title>STAB Roster</title>

    <!-- Match homepage font -->
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Bebas Neue', Arial, sans-serif;
            background-color: #000;
            color: #d4af37;
            margin: 0;
            padding: 40px;
        }

        /* Navigation */
        .nav {
            margin-bottom: 30px;
        }

        .nav a {
            margin-right: 20px;
            color: #d4af37;
            font-size: 28px;
            text-decoration: none;
            letter-spacing: 1px;
        }

        .nav a:hover {
            color: #cc0000;
        }

        /* Page Title */
        h1 {
            color: #cc0000;
            font-size: 72px;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        p {
            font-size: 28px;
            color: #d4af37;
            margin-bottom: 40px;
        }

        /* Member Cards */
        .member {
            padding: 20px;
            margin-bottom: 25px;
            border-bottom: 2px solid #333;
        }

        .member h2 a {
            color: #ff6666;
            font-size: 40px;
            text-decoration: none;
        }

        .member h2 a:hover {
            color: #cc0000;
        }

        .member p {
            font-size: 24px;
            margin: 5px 0;
        }
    </style>
</head>
<body>

    <!-- Navigation -->
    <div class="nav">
        <a href="index.html">Home</a>
        <a href="roster.html">Roster</a>
        <a href="history.html">History</a>
        <a href="legacy.html">Legacy Hall</a>
        <a href="awards.html">Awards</a>
        <a href="media.html">Media</a>
    </div>

    <h1>STAB Roster</h1>
    <p>Active members and their official titles.</p>

    <!-- Auto-generated roster -->
    <div id="memberList"></div>

    <script>
    fetch('members.json')
        .then(response => response.json())
        .then(members => {
            const container = document.getElementById('memberList');

            members.forEach(member => {
                const div = document.createElement('div');
                div.className = 'member';

                div.innerHTML = `
                    <h2><a href="members/${member.file}">${member.name}</a></h2>
                    <p>Title: ${member.roles}</p>
                    <p>Joined: ${member.joinDate}</p>
                `;

                container.appendChild(div);
            });
        })
        .catch(error => {
            console.error('Error loading members.json:', error);
        });
    </script>

</body>
</html>
